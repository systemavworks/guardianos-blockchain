# Añadir este bloque al Caddyfile existente de guardianos-audit
# NO modificar el bloque guardianos.es existente

blockchain.guardianos.es {
    # TLS gestionado automáticamente por Caddy (Let's Encrypt)
    
    # API → backend blockchain (puerto 8081)
    handle /api/* {
        reverse_proxy guardianos-blockchain-backend:8081
    }
    
    # Frontend → nginx del dashboard blockchain
    handle {
        reverse_proxy guardianos-blockchain-frontend:80
    }
    
    # Logging
    log {
        output file /var/log/caddy/blockchain-access.log
    }
}
