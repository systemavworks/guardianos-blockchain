ktor {
    application {
        modules = [ es.guardianos.blockchain.ApplicationKt.module ]
    }
    deployment {
        port = 8081
        watch = [ build ]
    }
}

database {
    url      = ${DATABASE_URL}
    user     = ${DB_USER}
    password = ${DB_PASSWORD}
    driver   = "org.postgresql.Driver"
    schema   = "blockchain"
}

redis {
    url = ${REDIS_URL}
}

auth {
    jwtSecret = ${JWT_SECRET}
    issuer = "guardianos-audit"
}

etherscan {
    apiKey = ${?ETHERSCAN_API_KEY}
    rateLimitPerSecond = 5
}
